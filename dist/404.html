<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ToolWiki</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the full path into a query param so index.html can restore it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(l.pathname.indexOf('/', 1) + 1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
